name: Sync Intervals.icu Data

on:
  schedule:
    - cron: '0 */4 * * *'  # Every 4 hours
  workflow_dispatch:       # This enables manual run once UI registers

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch and save latest data
        env:
          ATHLETE_ID: ${{ secrets.INTERVALS_ATHLETE_ID }}
          API_KEY: ${{ secrets.INTERVALS_API_KEY }}
        run: |
          python3 - <<EOF
import requests
import json
import os
from datetime import datetime, timedelta

athlete_id = os.environ['ATHLETE_ID']
api_key = os.environ['API_KEY']

auth = ('API_KEY', api_key)

base_url = f"https://intervals.icu/api/v1/athlete/{athlete_id}"

today = datetime.now().strftime("%Y-%m-%d")
oldest = (datetime.now() - timedelta(days=28)).strftime("%Y-%m-%d")

fitness_url = f"{base_url}/fitness?newest={today}&limit=1"
fitness_resp = requests.get(fitness_url, auth=auth)
fitness = fitness_resp.json()[0] if fitness_resp.ok and fitness_resp.json() else {}

wellness_url = f"{base_url}/wellness?newest={today}&limit=1"
wellness_resp = requests.get(wellness_url, auth=auth)
wellness = wellness_resp.json()[0] if wellness_resp.ok and wellness_resp.json() else {}

athlete_resp = requests.get(base_url, auth=auth)
athlete = athlete_resp.json() if athlete_resp.ok else {}

activities_url = f"{base_url}/activities?oldest={oldest}"
activities_resp = requests.get(activities_url, auth=auth)
activities = activities_resp.json() if activities_resp.ok else []

data = {
    "timestamp": datetime.now().isoformat(),
    "fitness_latest": fitness,
    "wellness_latest": wellness,
    "athlete_settings": athlete,
    "recent_activities": activities
}

with open("latest.json", "w") as f:
    json.dump(data, f, indent=2)
EOF
      - name: Commit changes
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add latest.json
          git commit -m 'Update latest Intervals.icu data [skip ci]' || echo 'No changes to commit'
          git push
