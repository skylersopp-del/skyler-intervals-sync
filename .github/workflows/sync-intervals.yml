name: Sync Intervals.icu Data

on:
  schedule:
    - cron: '0 */4 * * *'  # Every 4 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Download official Section 11 sync.py
        run: |
          curl -O https://raw.githubusercontent.com/CrankAddict/section-11/main/examples/sync.py

      - name: Run official sync.py with secrets
        env:
          ATHLETE_ID: ${{ secrets.INTERVALS_ATHLETE_ID }}
          INTERVALS_KEY: ${{ secrets.INTERVALS_API_KEY }}
          # Optional: WEEK_START=mon (or tue/wed/etc.) if not Monday start
          # ZONE_PREFERENCE=run:hr,cycling:power (if you want HR for run analysis)
        run: python3 sync.py --output latest.json --history history.json --intervals intervals.json

      - name: Commit changes if updated
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add latest.json history.json intervals.json || true
          git commit -m 'Update Intervals.icu data via official sync.py [skip ci]' || echo 'No changes to commit'
          git push || echo 'Push skipped'
