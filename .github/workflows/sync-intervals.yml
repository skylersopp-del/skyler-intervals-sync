name: Sync Intervals.icu Data

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      # Download Section 11 assets
      - name: Download latest Section 11 assets
        run: |
          mkdir -p CrankAddict_Section-11
          curl -s -S -o CrankAddict_Section-11/sync.py https://raw.githubusercontent.com/CrankAddict/section-11/main/examples/sync.py
          curl -s -S -o CrankAddict_Section-11/SECTION_11.md https://raw.githubusercontent.com/CrankAddict/section-11/main/SECTION_11.md

      # Run sync.py (confirmed working)
      - name: Run official sync.py
        env:
          ATHLETE_ID: ${{ secrets.INTERVALS_ATHLETE_ID }}
          INTERVALS_KEY: ${{ secrets.INTERVALS_API_KEY }}
        run: |
          python3 CrankAddict_Section-11/sync.py \
            --athlete-id "$ATHLETE_ID" \
            --intervals-key "$INTERVALS_KEY" \
            --output latest.json \
            --generate-history

      # Explicitly move both primary outputs to data/
      - name: Move generated files into /data
        run: |
          mkdir -p data
          mv latest.json data/latest.json || echo "latest.json not found in root - check if generated"
          mv history.json data/history.json || echo "history.json not found"
          ls -l data/   # Debug: should show fresh latest.json and history.json

      # Post-process (may generate/update intervals.json if custom)
      - name: Post-process notes and enrich JSON
        run: python3 scripts/enrich_notes.py

      - name: Build notes.json index
        run: |
          python3 scripts/build_notes_index.py
          ls -l data/   # Confirm all files present

      # Commit
      - name: Commit changes
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add data/*.json || true
          git commit -m 'Update Intervals.icu data (latest + history + notes) [skip ci]' || echo 'No changes'
          git push || echo 'Push skipped'
