name: Sync Intervals.icu Data

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests pandas

      - name: Download Section 11 assets
        run: |
          mkdir -p CrankAddict_Section-11
          curl -s -S -o CrankAddict_Section-11/sync.py https://raw.githubusercontent.com/CrankAddict/section-11/main/examples/sync.py

      - name: Run official sync.py
        env:
          ATHLETE_ID: ${{ secrets.INTERVALS_ATHLETE_ID }}
          INTERVALS_KEY: ${{ secrets.INTERVALS_API_KEY }}
        run: |
          python3 CrankAddict_Section-11/sync.py \
            --athlete-id "$ATHLETE_ID" \
            --intervals-key "$INTERVALS_KEY" \
            --intervals-base-url "https://intervals.icu/api/v1/athlete/$ATHLETE_ID/workouts?key=$INTERVALS_KEY&fields=all" \
            --output latest.json \
            --generate-history

      - name: Debug generated files
        run: |
          echo "Generated files:"
          ls -l .
          echo "Preview intervals.json:"
          head -n 50 intervals.json || true

      - name: Debug sync outputs
        run: |
          ls -l data/
          cat data/latest.json | head -20 || echo "latest.json empty/missing"

      - name: Debug sync outputs
        run: |
          echo "Files in working directory:"
          ls -l .
          echo "Preview latest.json:"
          head -n 20 latest.json || echo "latest.json missing"
          echo "Preview history.json:"
          head -n 20 history.json || echo "history.json missing"
          echo "Preview intervals.json:"
          head -n 20 intervals.json || echo "intervals.json missing"    

      - name: Move generated files into /data
        run: |
          mkdir -p data
          mv latest.json data/latest.json || echo "latest.json missing"
          mv history.json data/history.json || echo "history.json missing"
          mv intervals.json data/intervals.json || echo "intervals.json missing"

      - name: Ensure DOSSIER.md in root and data
        run: |
          if [ -f DOSSIER.md ]; then
            cp DOSSIER.md data/DOSSIER.md || echo "Copy to data failed"
          else
            echo "DOSSIER.md missing in root - manual fix needed"
          fi
          ls -l DOSSIER.md data/DOSSIER.md

      - name: Post-process & enrich (intervals + notes)
        run: python3 scripts/enrich_notes.py

      - name: Build notes index
        run: python3 scripts/build_notes_index.py

      - name: Commit
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add data/*.json DOSSIER.md || true
          git commit -m 'Update Intervals.icu data (latest/history/intervals/notes + DOSSIER) [skip ci]' || echo 'No changes'
          git push || echo 'Push skipped'
