name: Daily Intervals.icu Full History + ALL Previous-Day Streams

on:
  schedule:
    - cron: '0 9 * * *'   # runs daily at 9am UTC (previous day data)
  workflow_dispatch:      # manual run = current day data

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download full summary + all previous-day streams
        run: |
          mkdir -p data/history
          TODAY=$(date +%Y-%m-%d)
          YESTERDAY=$(date -d "yesterday" +%Y-%m-%d)

          # Summary CSV (full history)
          curl -v -u API_KEY:6pmirqiemk2ca5vr60ldosi85 -H "Accept: text/csv" \
            "https://intervals.icu/api/v1/athlete/i155257/activities.csv" \
            -o data/activities.csv
          cp data/activities.csv "data/history/activities_${TODAY}.csv"

          # Find all activities from previous day (or today on manual run)
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TARGET_DATE=$TODAY
          else
            TARGET_DATE=$YESTERDAY
          fi

          echo "Downloading streams for date: $TARGET_DATE"

          # Loop through every activity on that day and download its streams
          tail -n +2 data/activities.csv | while IFS=, read -r id start_date_local name type rest; do
            if [[ $start_date_local == *"$TARGET_DATE"* ]]; then
              echo "Downloading streams for activity $id ($name)"
              curl -v -u API_KEY:6pmirqiemk2ca5vr60ldosi85 -H "Accept: text/csv" \
                "https://intervals.icu/api/v1/activity/$id/streams.csv" \
                -o "data/history/streams_${TODAY}_${id}.csv"
            fi
          done

      - name: Commit changes
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add data/
          git commit -m "Full sync + all streams for ${TODAY}" || echo "No changes"
          git push
