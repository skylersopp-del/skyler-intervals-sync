name: Run AI Coach

on:
  schedule:
    # Daily coaching at 5am Pacific
    - cron: "0 12 * * *"
    # Weekly summary every Monday at 5am Pacific
    - cron: "0 12 * * MON"
    # Analysis + planning every Sunday at 5am Pacific
    - cron: "0 12 * * SUN"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  coach:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests openai anthropic google-generativeai  # Add providers as needed; adjust for your script

      - name: Run AI Coach (daily/weekly/sunday modes)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
        run: |
          cd coach
          # Run daily (default for most schedules)
          python -m engine.run_coach --kind "daily" --provider "openai" --model "gpt-4o-mini" || echo "Daily failed, continuing..."
          
          # Conditional weekly (Mondays)
          if [ "$(date +%u)" = "1" ]; then
            python -m engine.run_coach --kind "weekly" --provider "openai" --model "gpt-4o-mini" || echo "Weekly failed..."
          fi
          
          # Conditional Sunday analysis/plan
          if [ "$(date +%u)" = "7" ]; then
            python -m engine.run_coach --kind "analysis" --provider "openai" --model "gpt-4o-mini" || echo "Analysis failed..."
            python -m engine.run_coach --kind "plan" --provider "openai" --model "gpt-4o-mini" || echo "Plan failed..."
          fi
          
          cd ..

      - name: Commit coach outputs
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add coach/outputs/*.md || true
          git commit -m 'Update AI Coach outputs (daily/weekly/analysis/plan) [skip ci]' || echo 'No coach changes to commit'
          git push || echo 'Push skipped'

      - name: Debug listing (post-run)
        run: ls -l coach/outputs/
